tools:
  rag_search:
    command: "cd {workspace}/tools && python3 rag_engine.py search '{query}' --limit {limit}"
    description: "Search knowledge base semantically"
    parameters:
      - query: string (required)
      - limit: integer (default: 5)
  rag_index:
    command: "cd {workspace}/tools && python3 rag_engine.py index '{path}'"
    description: "Index a file into knowledge base"
    parameters:
      - path: string (required)
  rag_index_dir:
    command: "cd {workspace}/tools && python3 rag_engine.py index-dir '{directory}'"
    description: "Index entire directory"
    parameters:
      - directory: string (required)
  context_gather:
    command: "cd {workspace}/tools && python3 context_gatherer.py"
    description: "Gather current system context (git, files, shell)"
    parameters: []
  session_create:
    command: "cd {workspace}/tools && python3 session_manager.py create '{name}' '{prompt}'"
    description: "Create new branch session"
    parameters:
      - name: string (required)
      - prompt: string (required)
  session_start:
    command: "cd {workspace}/tools && python3 session_manager.py start {session_id}"
    description: "Start a created session"
    parameters:
      - session_id: string (required)
  session_list:
    command: "cd {workspace}/tools && python3 session_manager.py list"
    description: "List all sessions"
    parameters: []
variables:
  workspace: "~/Dokumente/projects/Apps/partner/meta-orchestrator"
